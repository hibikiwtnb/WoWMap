<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WoWMap</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand" id="brand-panel">
          <p class="eyebrow">World of Warcraft 3.3.5</p>
          <h1>WoWMap</h1>
          <p class="subtitle">帶導航功能的魔獸世界地圖。</p>
        </div>

        <section class="panel route-panel" id="route-panel">
          <h2>導航</h2>
          <div class="locale-switch route-faction-switch" id="route-faction-switch">
            <button type="button" class="locale-button active" data-route-faction="alliance">聯盟</button>
            <button type="button" class="locale-button" data-route-faction="horde">部落</button>
          </div>
          <div class="route-points">
            <button type="button" class="route-point" id="pick-start">
              <span class="route-point-label">起點</span>
              <strong id="route-start-label">未設定</strong>
            </button>
            <button type="button" class="route-point" id="pick-end">
              <span class="route-point-label">終點</span>
              <strong id="route-end-label">未設定</strong>
            </button>
          </div>
          <div class="route-actions">
            <button type="button" class="route-button primary" id="route-solve">開始導航</button>
            <button type="button" class="route-button" id="route-swap">交換</button>
            <button type="button" class="route-button" id="route-clear">清除</button>
          </div>
          <p class="route-hint" id="route-hint">先點左側起點或終點，再到地圖上選位置。</p>
          <div class="route-summary" id="route-summary"></div>
        </section>

        <section class="panel info-panel" id="info-panel" hidden>
          <div class="info-panel-header">
            <h2>地點資訊</h2>
            <button type="button" class="info-close" id="info-close" aria-label="Close">×</button>
          </div>
          <p class="info-placeholder">左鍵點地圖上的位置、飛行點或區域，這裡會顯示基本資訊。</p>
        </section>

        <section class="panel" id="layers-panel">
          <h2>圖層</h2>
          <div class="locale-switch" id="locale-switch">
            <button type="button" class="locale-button active" data-locale="zh">中文</button>
            <button type="button" class="locale-button" data-locale="en">EN</button>
          </div>
          <div class="layer-grid">
            <label class="layer-option">
              <input type="checkbox" id="toggle-zones" />
              <span class="layer-option-title">區域框</span>
              <span class="layer-option-subtitle">矩形範圍</span>
            </label>
            <label class="layer-option">
              <input type="checkbox" id="toggle-zone-labels" checked />
              <span class="layer-option-title">區域名稱</span>
              <span class="layer-option-subtitle">地區標註</span>
            </label>
            <label class="layer-option">
              <input type="checkbox" id="toggle-paths" checked />
              <span class="layer-option-title">飛行線</span>
              <span class="layer-option-subtitle">Taxi 路徑</span>
            </label>
            <label class="layer-option">
              <input type="checkbox" id="toggle-nodes" checked />
              <span class="layer-option-title">飛行點</span>
              <span class="layer-option-subtitle">交通節點</span>
            </label>
            <label class="layer-option layer-option-wide">
              <input type="checkbox" id="toggle-node-labels" checked />
              <span class="layer-option-title">飛行點名稱</span>
              <span class="layer-option-subtitle">節點文字標註</span>
            </label>
          </div>
        </section>
      </aside>

      <main class="stage">
        <div class="map-stage">
          <div class="map-controls" aria-label="Map controls">
            <button type="button" id="zoom-in" class="map-control-button">+</button>
            <button type="button" id="zoom-out" class="map-control-button">-</button>
            <button type="button" id="zoom-reset" class="map-control-button map-control-reset">Reset</button>
          </div>
          <div class="cursor-coords" id="cursor-coords">X: -, Y: -</div>
          <svg id="map-svg" viewBox="0 0 1000 700" role="img" aria-label="WoWMap prototype map">
            <g id="terrain-layer"></g>
            <g id="zone-layer"></g>
            <g id="path-layer"></g>
            <g id="route-layer"></g>
            <g id="node-layer"></g>
            <g id="route-marker-layer"></g>
            <g id="node-label-layer"></g>
            <g id="path-label-layer"></g>
            <g id="label-layer"></g>
          </svg>
        </div>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
